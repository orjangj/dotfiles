general {
  gaps_in = 2
  gaps_out = 5
  border_size = 2
  col.active_border = $border_active $border_inactive 45deg
  col.inactive_border = $border_inactive $border_inactive_dim 45deg
  layout = master
}

windowrulev2 = float, title:^(btop|nnn|todo)$
windowrulev2 = size 80% 80%, title:^(btop|nnn|todo)$
windowrulev2 = center, title:^(btop|nnn|todo)$

windowrulev2 = float, class:^FortiClient$
windowrulev2 = float, class:^Vncviewer$

windowrulev2 = float, title:^Volume Control$
windowrulev2 = size 50% 50%, title:^Volume Control$

# E.g. popup window for saving/uploading files in browser such as Firefox
windowrulev2 = float, title:^(Save As|Open Files).*$
windowrulev2 = size 80% 80%, title:^(Save As|Open Files).*$
windowrulev2 = center,title:^(Save As|Open Files).*$

windowrulev2 = workspace 3, class:(Slack)

windowrulev2 = float, class:(qemu)
windowrulev2 = size 90% 90%, class:(qemu)
windowrulev2 = center, class:(qemu)
windowrulev2 = workspace 4, class:(qemu)

windowrulev2 = float, class:(virt-viewer)
windowrulev2 = size 90% 90%, class:(virt-viewer)
windowrulev2 = center, class:(virt-viewer)
windowrulev2 = workspace 4, class:(virt-viewer)

windowrulev2 = float, title:^(System Update|Firmware Update)$
windowrulev2 = size 60% 60%, title:^(System Update|Firmware Update)$
windowrulev2 = center, title:^(System Update|Firmware Update)$
