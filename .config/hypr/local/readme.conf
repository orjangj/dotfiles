# ============================================================================
#  ~/.config/hypr/local/  —  machine-local Hyprland config drop-in
# ============================================================================
#
#  PURPOSE
#    Per-machine Hyprland config that should NOT live in your tracked/portable
#    dotfiles. Anything here applies only to the machine it physically exists
#    on — work-only keybinds, a desk's monitor layout, work autostarts, etc.
#
#  HOW IT LOADS
#    hyprland.conf sources this whole folder with a wildcard:
#
#        source = $HOME/.config/hypr/local/*.conf
#
#    Hyprland reads every *.conf here in alphabetical order, AFTER the tracked
#    conf/ files — so settings here OVERRIDE the defaults (last write wins).
#
#  WHY THIS readme.conf IS TRACKED
#    A wildcard `source =` that matches ZERO files is a FATAL error in Hyprland
#    (tested on 0.51.1) — same as sourcing a missing file. This file is
#    committed so the glob always matches at least one file on every machine,
#    keeping the seam harmless when no machine-local config exists. It is pure
#    comments, so it contributes no actual settings. Do not delete it.
#
#  WHAT TO PUT HERE  (create additional *.conf files)
#    - Work-only launchers / keybinds   e.g. local/work.conf
#    - Machine-specific monitor setup    e.g. local/monitors.conf
#    - Host-specific autostarts          e.g. local/autostart.conf
#    Each file is plain Hyprland config syntax (bind = ..., monitor = ..., etc).
# ============================================================================
